# =============================================================================
# QR Restaurant Ordering SaaS — Docker Development Compose Override
#
# Extends docker-compose.yml for local development:
#   • Hot-reloading via bind mounts
#   • Exposes extra ports for debugging
#   • Overrides commands to use watch mode
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # Backend dev override — use nest watch instead of node dist/src/main
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev   # lightweight dev image (see below)
    environment:
      NODE_ENV: development
    volumes:
      # Source bind mount for hot-reload
      - ./backend/src:/app/src:ro
      - ./backend/prisma:/app/prisma:ro
    command: ["npm", "run", "start:dev"]
    ports:
      - "3001:3001"
      - "9229:9229"   # Node.js debugger

  # ---------------------------------------------------------------------------
  # Frontend dev override — next dev with bind mount
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
    command: ["npm", "run", "dev"]
    ports:
      - "3000:3000"
